<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    body { max-width: 1200px; margin: 0 auto; padding: 2rem; background: #ffffff; color: #1f2328; }
    .markdown-body { background: #ffffff; color: #1f2328; }
    .markdown-body table { display: table; width: 100%; }
    .markdown-body table th { background: #f6f8fa; border-color: #d0d7de; font-weight: 600; }
    .markdown-body table td { background: #ffffff; border-color: #d0d7de; }
    .markdown-body table tr:nth-child(2n) td { background: #f6f8fa; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-color: #d0d7de; color: #1f2328; }
    .markdown-body a { color: #0969da; }
    .markdown-body blockquote { border-left-color: #0969da; color: #656d76; }
    .markdown-body code { background: #eff1f3; color: #1f2328; }
    .markdown-body pre { background: #f6f8fa; }
    .mermaid { background: #fff; border-radius: 8px; padding: 1rem; margin: 1rem 0; border: 1px solid #d0d7de; }
  </style>
</head>
<body class="markdown-body">
  {{ content }}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
    // Convert ```mermaid code blocks to mermaid divs
    document.querySelectorAll('pre code.language-mermaid').forEach(el => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
    mermaid.run();
  </script>
</body>
</html>
